<div class="dialog-wrapper">
  <h2 class="dialog-title">
    {{ isEdit ? "Uredi termin" : "Kreiraj termin" }}
  </h2>

  <mat-dialog-content>
    <div class="dialog-form">
      <!-- DATE & TIME -->
      <div class="datetime-row">
        <div class="form-group">
          <label>Datum</label>
          <input
            type="date"
            class="form-control"
            [value]="selectedDate"
            (input)="onDateInput($event)"
            required
            cdkFocusInitial
          />
        </div>

        <div class="form-group">
          <label>Vrijeme</label>
          <select
            class="form-control"
            [value]="selectedTime"
            (change)="onTimeChange($event)"
            required
          >
            <option value="">Odaberite vrijeme</option>
            <option *ngFor="let t of times" [value]="t" [selected]="t === selectedTime">{{ t }}</option>
          </select>
        </div>
      </div>

      <!-- FACILITY -->
      <div class="form-group">
        <label>Lokacija *</label>
        <select
          class="form-control"
          [value]="selectedFacilityId || ''"
          (change)="onFacilityChange($event)"
          required
        >
          <option value="">Odaberite lokaciju</option>
          <option *ngFor="let f of facilities" [value]="f.id" [selected]="f.id === selectedFacilityId">
            {{ f.name }}
          </option>
        </select>
      </div>

      <!-- APPOINTMENT TYPE -->
      <div class="form-group">
        <label>Tip termina *</label>
        <select
          class="form-control"
          [value]="selectedTypeId || ''"
          (change)="onTypeChange($event)"
          required
        >
          <option value="">Odaberite tip</option>
          <option
            *ngFor="let t of appointmentTypes"
            [value]="t.id"
            [selected]="t.id === selectedTypeId"
          >
            {{ t.name }} ({{ t.duration }} min)
          </option>
        </select>
      </div>

      <!-- USER - Only visible for Admin and Uposlenik -->
      <div class="form-group" *ngIf="canSelectUser">
        <label>Korisnik *</label>
        <select
          class="form-control"
          [value]="selectedUserId || ''"
          (change)="onUserChange($event)"
          required
        >
          <option value="">Odaberite korisnika</option>
          <option *ngFor="let u of users" [value]="u.id" [selected]="u.id.toString() === selectedUserId">
            {{ u.userName }} ({{ u.email }})
          </option>
        </select>
      </div>

      <!-- CHECKBOXES -->
      <div hidden class="checkbox-group">
        <label class="checkbox-label">
          <input
            type="checkbox"
            [checked]="isFree"
            (change)="onFreeChange($event)"
          />
          <span>Besplatno</span>
        </label>

        <label class="checkbox-label">
          <input
            type="checkbox"
            [checked]="isClosed"
            (change)="onClosedChange($event)"
          />
          <span>Zatvoreno</span>
        </label>
      </div>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end" class="dialog-actions">
    <button
      *ngIf="isEdit"
      class="btn btn-danger"
      type="button"
      (click)="delete()"
    >
      Obriši
    </button>

    <div class="spacer"></div>

    <button class="btn btn-secondary" type="button" (click)="cancel()">
      Otkaži
    </button>

    <button
      class="btn btn-primary"
      type="button"
      [disabled]="!isFormValid()"
      (click)="save()"
    >
      {{ isEdit ? "Ažuriraj" : "Kreiraj" }}
    </button>
  </mat-dialog-actions>
</div>
