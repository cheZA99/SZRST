<div class="outer">
  <div class="container">
    <div class="row">
      <div class="offset-md-2 col-lg-5 col-md-7 offset-lg-4 offset-md-3">
        <div class="panel border bg-white">
          <div class="panel-heading">
            <h3 class="pt-3 font-weight-bold">Prijava</h3>
          </div>
          <div class="panel-body p-3">
            <form [formGroup]="loginForm">
              <div class="form-group pt-3">
                <small
                  *ngIf="
                    loginForm.controls['email'].dirty &&
                    loginForm.hasError('required', 'email')
                  "
                  class="text-danger"
                  >*Email je obavezan</small
                >
                <div
                  class="input-field"
                  [class.error]="
                    loginForm.controls['email'].dirty &&
                    loginForm.hasError('required', 'email')
                  "
                >
                  <span class="fa fa-user-circle p-2"></span>
                  <input
                    formControlName="email"
                    type="text"
                    placeholder="Email"
                  />
                </div>
              </div>
              <div class="form-group pt-3">
                <small
                  *ngIf="
                    loginForm.controls['password'].dirty &&
                    loginForm.hasError('required', 'password')
                  "
                  class="text-danger"
                  >*Lozinka je obavezna</small
                >
                <div
                  class="input-field"
                  [class.error]="
                    loginForm.controls['password'].dirty &&
                    loginForm.hasError('required', 'password')
                  "
                >
                  <span class="fa fa-lock p-2"></span>
                  <input
                    formControlName="password"
                    [type]="type"
                    placeholder="Lozinka"
                  />
                  <span
                    (click)="hideShowPass()"
                    className="fa {{ eyeIcon }}"
                  ></span>
                </div>
                <div class="form-inline fr mt-4">
                  <a
                    id="forget"
                    class="font-weight-bold d-flex justify-content-center"
                    >Zaboravili ste lozinku?</a
                  >
                </div>
                <button
                  (click)="onLogin()"
                  type="submit"
                  class="btn btn-primary btn-block mt-4 w-100"
                >
                  Prijavi se
                </button>
                <!-- <div class="text-center pt-4 text-muted">
                  Nemate račun?
                  <a id="forget" routerLink="/signup"
                    >Kreiraj novi korisnički račun</a
                  >
                </div> -->
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
