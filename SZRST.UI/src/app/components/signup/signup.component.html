<div class="outer">
    <div class="container">
        <div class="row">
            <div class="offset-md-2 col-lg-5 col-md-7 offset-lg-4 offset-md-3">
                <div class="panel border bg-white">
                    <div class="panel-heading">
                        <h3 class="pt-3 font-weight-bold">Registracija</h3>
                    </div>
                    <div class="panel-body p-3">
                        <form>
                            <div class="form-group pt-3">
                                <div class="input-field">
                                    <span class="fa fa-user p-2"></span>
                                    <input type="text" placeholder="Ime">
                                </div>
                            </div>
                            <div class="form-group pt-3">
                                <div class="input-field">
                                    <span class="fa fa-user-o p-2"></span>
                                    <input type="text" placeholder="Prezime">
                                </div>
                            </div>
                            <div class="form-group pt-3">
                                <div class="input-field">
                                    <span class="fa fa-envelope p-2"></span>
                                    <input type="text" placeholder="Email">
                                </div>
                            </div>
                            <div class="form-group pt-3">
                                <div class="input-field">
                                    <span class="fa fa-user-circle p-2"></span>
                                    <input type="text" placeholder="Korisničko Ime">
                                </div>
                            </div>
                            <div class="form-group pt-3">
                                <div class="input-field">
                                    <span class="fa fa-lock p-2"></span>
                                    <input [type]="type" placeholder="Lozinka">
                                    <span (click)="hideShowPass()"className="fa {{eyeIcon}}"></span>
                                </div>
                                <button type="submit" class="btn btn-primary btn-block mt-4 w-100">Registriraj se</button>
                                <div class="text-center pt-4 text-muted">Imate račun? <a id="forget" routerLink="/login">Prijava</a></div>
                                
                            </div>
                        </form>
                    </div>
                </div>
            </div>   
        </div>
    </div>
</div>
