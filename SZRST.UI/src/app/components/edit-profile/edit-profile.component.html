<div class="container mx-auto p-6 max-w-4xl">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Uredi Profil</h1>
  </div>

  <div *ngIf="loading" class="flex justify-center items-center h-64">
    <span class="loading loading-spinner loading-lg"></span>
  </div>

  <form *ngIf="!loading" [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="space-y-6">
    <!-- Profile Image Section -->
    <div class="card bg-base-100 shadow-xl">
      <div class="card-body">
        <h2 class="card-title mb-4">Profilna Slika</h2>
        
        <div class="flex flex-col md:flex-row gap-6 items-center">
          <div class="avatar">
            <div class="w-32 h-32 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
              <img 
                [src]="imagePreview || 'assets/pictures/user.png'" 
                alt="Profile"
                class="object-cover"
              />
            </div>
          </div>

          <div class="flex flex-col gap-3">
            <input 
              type="file" 
              #fileInput
              accept="image/*"
              (change)="onFileSelected($event)"
              class="hidden"
            />
            <button 
              type="button"
              (click)="fileInput.click()"
              class="btn btn-primary"
            >
              Odaberi Sliku
            </button>
            <button 
              type="button"
              *ngIf="imagePreview"
              (click)="removeImage()"
              class="btn btn-error btn-outline"
            >
              Ukloni Sliku
            </button>
            <p class="text-sm text-gray-500">
              Podržani formati: JPG, PNG, GIF (max 5MB)
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- Basic Information -->
    <div class="card bg-base-100 shadow-xl">
      <div class="card-body">
        <h2 class="card-title mb-4">Osnovne Informacije</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="form-control w-full">
            <label class="label">
              <span class="label-text">Korisničko Ime *</span>
            </label>
            <input
              type="text"
              formControlName="userName"
              placeholder="Unesite korisničko ime"
              class="input input-bordered w-full"
              [class.input-error]="profileForm.get('userName')?.invalid && profileForm.get('userName')?.touched"
            />
            <label class="label" *ngIf="profileForm.get('userName')?.invalid && profileForm.get('userName')?.touched">
              <span class="label-text-alt text-error">
                Korisničko ime mora imati najmanje 3 karaktera
              </span>
            </label>
          </div>

          <div class="form-control w-full">
            <label class="label">
              <span class="label-text">Email *</span>
            </label>
            <input
              type="email"
              formControlName="email"
              placeholder="email@example.com"
              class="input input-bordered w-full"
              [class.input-error]="profileForm.get('email')?.invalid && profileForm.get('email')?.touched"
            />
            <label class="label" *ngIf="profileForm.get('email')?.invalid && profileForm.get('email')?.touched">
              <span class="label-text-alt text-error">
                Unesite validan email
              </span>
            </label>
          </div>

          <div class="form-control w-full">
            <label class="label">
              <span class="label-text">Ime za Prikaz *</span>
            </label>
            <input
              type="text"
              formControlName="displayName"
              placeholder="Ime koje će se prikazivati"
              class="input input-bordered w-full"
              [class.input-error]="profileForm.get('displayName')?.invalid && profileForm.get('displayName')?.touched"
            />
            <label class="label" *ngIf="profileForm.get('displayName')?.invalid && profileForm.get('displayName')?.touched">
              <span class="label-text-alt text-error">
                Ime mora imati najmanje 2 karaktera
              </span>
            </label>
          </div>

          <div class="form-control w-full">
            <label class="label">
              <span class="label-text">Datum Rođenja</span>
            </label>
            <input
              type="date"
              formControlName="dateOfBirth"
              class="input input-bordered w-full"
            />
          </div>

          <div class="form-control w-full">
            <label class="label">
              <span class="label-text">Pol</span>
            </label>
            <select formControlName="gender" class="select select-bordered w-full">
              <option value="">Odaberite</option>
              <option value="Male">Muški</option>
              <option value="Female">Ženski</option>
              <option value="Other">Ostalo</option>
            </select>
          </div>

          <div class="form-control w-full">
            <label class="label">
              <span class="label-text">Država</span>
            </label>
            <select formControlName="countryId" class="select select-bordered w-full">
              <option value="">Odaberite državu</option>
              <option *ngFor="let country of countries" [value]="country.id">
                {{ country.name }}
              </option>
            </select>
          </div>

          <div class="form-control w-full">
            <label class="label">
              <span class="label-text">Grad</span>
            </label>
            <select 
              formControlName="cityId" 
              class="select select-bordered w-full"
              [disabled]="!profileForm.get('countryId')?.value"
            >
              <option value="">Odaberite grad</option>
              <option *ngFor="let city of filteredCities" [value]="city.id">
                {{ city.name }}
              </option>
            </select>
            <label class="label" *ngIf="!profileForm.get('countryId')?.value">
              <span class="label-text-alt text-gray-500">
                Prvo odaberite državu
              </span>
            </label>
          </div>
        </div>

        <div class="form-control w-full mt-4">
          <label class="label">
            <span class="label-text">Opis</span>
          </label>
          <textarea
            formControlName="description"
            placeholder="Napišite nešto o sebi..."
            class="textarea textarea-bordered h-24"
          ></textarea>
        </div>
      </div>
    </div>

    <!-- Password Change Section -->
    <div class="card bg-base-100 shadow-xl">
      <div class="card-body">
        <h2 class="card-title mb-4">Promjena Lozinke</h2>
        <p class="text-sm text-gray-500 mb-4">
          Ostavite prazno ako ne želite promijeniti lozinku
        </p>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="form-control w-full">
            <label class="label">
              <span class="label-text">Trenutna Lozinka</span>
            </label>
            <div class="relative">
              <input
                [type]="showCurrentPassword ? 'text' : 'password'"
                formControlName="currentPassword"
                placeholder="••••••••"
                class="input input-bordered w-full pr-10"
              />
              <button
                type="button"
                (click)="togglePasswordVisibility('current')"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
              >
                <svg *ngIf="!showCurrentPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <svg *ngIf="showCurrentPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              </button>
            </div>
          </div>

          <div class="form-control w-full">
            <label class="label">
              <span class="label-text">Nova Lozinka</span>
            </label>
            <div class="relative">
              <input
                [type]="showNewPassword ? 'text' : 'password'"
                formControlName="newPassword"
                placeholder="••••••••"
                class="input input-bordered w-full pr-10"
              />
              <button
                type="button"
                (click)="togglePasswordVisibility('new')"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
              >
                <svg *ngIf="!showNewPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <svg *ngIf="showNewPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              </button>
            </div>
          </div>

          <div class="form-control w-full">
            <label class="label">
              <span class="label-text">Potvrdi Novu Lozinku</span>
            </label>
            <div class="relative">
              <input
                [type]="showConfirmPassword ? 'text' : 'password'"
                formControlName="confirmPassword"
                placeholder="••••••••"
                class="input input-bordered w-full pr-10"
                [class.input-error]="profileForm.errors?.['mismatch'] && profileForm.get('confirmPassword')?.touched"
              />
              <button
                type="button"
                (click)="togglePasswordVisibility('confirm')"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
              >
                <svg *ngIf="!showConfirmPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <svg *ngIf="showConfirmPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              </button>
            </div>
            <label class="label" *ngIf="profileForm.errors?.['mismatch'] && profileForm.get('confirmPassword')?.touched">
              <span class="label-text-alt text-error">
                Lozinke se ne podudaraju
              </span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="flex justify-end gap-3">
      <button 
        type="button" 
        (click)="cancel()" 
        class="btn btn-ghost"
        [disabled]="loading"
      >
        Odustani
      </button>
      <button 
        type="submit" 
        class="btn btn-primary"
        [disabled]="profileForm.invalid || loading"
      >
        <span *ngIf="loading" class="loading loading-spinner loading-sm"></span>
        <span *ngIf="!loading">Sačuvaj Promjene</span>
      </button>
    </div>
  </form>
</div>
